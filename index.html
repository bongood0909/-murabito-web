<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>むらびと - 農業マッチングアプリ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif; line-height: 1.8; color: #333; background: #fafafa; }
        .hero { background: linear-gradient(135deg, #2d5016 0%, #4a8c1c 100%); color: white; padding: 80px 20px; text-align: center; }
        .hero h1 { font-size: 36px; margin-bottom: 12px; }
        .hero p { font-size: 18px; opacity: 0.9; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        .features { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin: 40px 0; }
        .feature { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .feature h3 { color: #2d5016; margin-bottom: 8px; font-size: 16px; }
        .feature p { font-size: 14px; color: #666; }
        .links { text-align: center; margin-top: 40px; padding: 24px; border-top: 1px solid #eee; }
        .links a { color: #4a8c1c; text-decoration: none; margin: 0 16px; font-size: 14px; }
        .links a:hover { text-decoration: underline; }
        @media (max-width: 600px) { .features { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="hero">
        <h1>むらびと</h1>
        <p>農家と地域をつなぐ、農家と未来をつなぐ</p>
    </div>
    <div class="container">
        <p style="text-align:center; font-size:16px; margin-bottom:32px;">「むらびと」は、農家と地域の人々をつなぐ農業マッチングアプリです。農作業の求人掲載から応募、チャットでのやりとり、スキルアップまで、農業に関わるすべてをサポートします。</p>
        <div class="features">
            <div class="feature">
                <h3>お仕事マッチング</h3>
                <p>農家が求人を出し、地域の住民が簡単に応募できます。時給・日給に対応。</p>
            </div>
            <div class="feature">
                <h3>チャット機能</h3>
                <p>農家と住民がアプリ内で直接やりとりできます。</p>
            </div>
            <div class="feature">
                <h3>スキルアップ</h3>
                <p>農作業のスキルを記録し、経験に応じてランクアップしていきます。</p>
            </div>
            <div class="feature">
                <h3>スタッフ管理</h3>
                <p>農家はスタッフの評価や管理を一元的に行えます。</p>
            </div>
        </div>
        <div class="links">
            <a href="privacy.html">プライバシーポリシー</a>
            <a href="terms.html">利用規約</a>
        </div>
    </div>
</body>
</html>
